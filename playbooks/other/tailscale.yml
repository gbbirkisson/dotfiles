---
- hosts: "{{ host }}"
  gather_facts: true

  tasks:
    - name: Set DPKG architecture
      set_fact:
        dpkg_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}"

    - name: Check if tailscale is installed
      command: which tailscale
      changed_when: false
      failed_when: tailscale_installed.rc not in [0,1]
      register: tailscale_installed

    - name: Create keyrings directory for Tailscale GPG key
      when: tailscale_installed.rc not in [ 0 ]
      become: true
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Tailscale's official GPG key
      when: tailscale_installed.rc not in [ 0 ]
      become: true
      get_url:
        url: https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.noarmor.gpg
        dest: /etc/apt/keyrings/tailscale.gpg
        mode: "0644"
        force: true

    - name: Add Tailscale Apt Repository
      when: tailscale_installed.rc not in [ 0 ]
      become: true
      apt_repository:
        repo: "deb [arch={{ dpkg_arch }} signed-by=/etc/apt/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} main"
        state: present
        filename: tailscale

    - name: Install Tailscale
      become: true
      apt:
        state: latest
        update_cache: true
        pkg:
          - tailscale

---
- hosts: "{{ host }}"

  vars:
    # renovate: datasource=github-tags depName=ghostty packageName=ghostty-org/ghostty
    version: v1.3.1
    zig_version: 0.15.2

    # version: v1.1.3
    # zig_version: 0.13.0

  tasks:
    - name: Check if skip
      meta: end_play
      when: '"ghostty" in skip'

    - name: Create local bin path
      ansible.builtin.file:
        path: ~/.local/bin
        state: directory

    - name: Check if ghostty is installed
      shell: "ghostty +version 2>&1 | grep {{ version[1:] }}"
      changed_when: false
      failed_when: ghostty_installed.rc not in [0,1]
      register: ghostty_installed

    - name: Install dev dependencies
      when: ghostty_installed.rc not in [ 0 ]
      become: true
      apt:
        state: latest
        update_cache: true
        pkg:
          - gettext
          - libadwaita-1-dev
          - libgtk-4-dev
          - libxml2-utils
          # Link the distro's fontconfig instead of ghostty's bundled copy (see -fsys below).
          # The bundled fontconfig segfaults in font fallback; the distro's is stable.
          # (pulls in libfreetype-dev, which fontconfig.pc requires to build against.)
          - libfontconfig-dev

    - name: Install gtk4-layer-shell, falling back to ghostty's bundled build
      when: ghostty_installed.rc not in [ 0 ]
      block:
        - name: Install libgtk4-layer-shell-dev from apt
          become: true
          apt:
            state: latest
            update_cache: true
            pkg:
              - libgtk4-layer-shell-dev
        - name: Use system gtk4-layer-shell
          set_fact:
            layer_shell_from_apt: true
      rescue:
        - name: Distro doesn't package gtk4-layer-shell, ghostty will build it from source
          set_fact:
            layer_shell_from_apt: false

    - name: Download ghostty source
      when: ghostty_installed.rc not in [ 0 ]
      unarchive:
        remote_src: yes
        src: "https://release.files.ghostty.org/{{ version[1:] }}/ghostty-{{ version[1:] }}.tar.gz"
        dest: "/tmp"

    - name: Build ghostty
      when: ghostty_installed.rc not in [ 0 ]
      # -fsys=fontconfig links the distro's fontconfig; ghostty's bundled copy segfaults
      #   during font fallback. We don't force freetype (its -fsys path links a misnamed
      #   "bzip2" that doesn't resolve on Debian/Ubuntu, where the lib is libbz2).
      # -fno-sys lets ghostty build gtk4-layer-shell itself when the distro doesn't package it.
      shell: >-
        mise exec zig@{{ zig_version }} -- zig build -p $HOME/.local
        -Doptimize={{ 'Debug' if ghostty_debug | default(false) else 'ReleaseFast' }}
        -fsys=fontconfig
        {{ '' if layer_shell_from_apt | default(false) else '-fno-sys=gtk4-layer-shell' }}
      args:
        chdir: /tmp/ghostty-{{ version[1:] }}

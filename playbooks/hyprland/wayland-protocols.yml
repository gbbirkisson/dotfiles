---
- hosts: "{{ host }}"

  vars:
    # renovate: datasource=git-tags depName=wayland-protocols packageName=https://gitlab.freedesktop.org/wayland/wayland-protocols.git
    version: "1.48"
    dir: "/tmp/wayland-protocols"

  tasks:
    - name: Check if skip
      meta: end_play
      when: '"hyprland" in skip'

    - name: Checkout wayland-protocols
      ansible.builtin.git:
        repo: https://gitlab.freedesktop.org/wayland/wayland-protocols.git
        dest: "{{ dir }}"
        version: "{{ version }}"
        force: true

    - name: Build wayland-protocols
      shell:
        chdir: "{{ dir }}"
        cmd: |
          meson setup build --prefix=/usr/local
          ninja -C build

    - name: Install wayland-protocols to /usr/local
      become: true
      shell:
        chdir: "{{ dir }}"
        cmd: |
          ninja -C build install
